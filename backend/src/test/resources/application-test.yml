spring:
  datasource:
    url: jdbc:h2:mem:yeribank;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false

app:
  kafka:
    enabled: false
    transfer-topic: transfer-created-test

